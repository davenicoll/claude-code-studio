<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#0ea5e9" stroke-width="0.5">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Connection lines from center to nodes -->
  <g stroke="url(#glow)" stroke-width="2" opacity="0.35" stroke-dasharray="6 4">
    <!-- Center to top-left -->
    <line x1="240" y1="250" x2="128" y2="148"/>
    <!-- Center to top-right -->
    <line x1="280" y1="250" x2="392" y2="148"/>
    <!-- Center to bottom-left -->
    <line x1="240" y1="290" x2="128" y2="388"/>
    <!-- Center to bottom-right -->
    <line x1="280" y1="290" x2="392" y2="388"/>
  </g>

  <!-- Center terminal prompt -->
  <g filter="url(#softGlow)">
    <!-- Terminal box -->
    <rect x="168" y="208" width="176" height="96" rx="12" ry="12"
          fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.9"/>

    <!-- Prompt symbol >_ -->
    <text x="200" y="272" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace"
          font-size="48" font-weight="700" fill="#0ea5e9" opacity="0.95">
      &gt;_
    </text>
  </g>

  <!-- Orbiting agent nodes -->
  <!-- Top-left node (cyan) -->
  <g filter="url(#nodeGlow)">
    <circle cx="128" cy="148" r="18" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.8"/>
    <circle cx="128" cy="148" r="6" fill="#0ea5e9" opacity="0.9"/>
  </g>

  <!-- Top-right node (purple) -->
  <g filter="url(#nodeGlow)">
    <circle cx="392" cy="148" r="18" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.8"/>
    <circle cx="392" cy="148" r="6" fill="#8b5cf6" opacity="0.9"/>
  </g>

  <!-- Bottom-left node (green) -->
  <g filter="url(#nodeGlow)">
    <circle cx="128" cy="388" r="18" fill="none" stroke="#10b981" stroke-width="2" opacity="0.8"/>
    <circle cx="128" cy="388" r="6" fill="#10b981" opacity="0.9"/>
  </g>

  <!-- Bottom-right node (orange) -->
  <g filter="url(#nodeGlow)">
    <circle cx="392" cy="388" r="18" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
    <circle cx="392" cy="388" r="6" fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Small decorative dots (data flow) -->
  <circle cx="178" cy="194" r="3" fill="#0ea5e9" opacity="0.5"/>
  <circle cx="340" cy="194" r="3" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="178" cy="342" r="3" fill="#10b981" opacity="0.5"/>
  <circle cx="340" cy="342" r="3" fill="#f59e0b" opacity="0.5"/>
</svg>
